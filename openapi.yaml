openapi: "3.0.0"
info: 
  version: "1.1"
  title: "USOM API"
  description: |
    USOM, 5809 sayýlý kanun ile kendisine verilen görevler kapsamýnda yürüttüđü çalýţmalarla tespit ettiđi tehdit istihbarat verilerini (zararlý ip, domain, url adresleri vb.) [www.usom.gov.tr](https://www.usom.gov.tr/adres) web adresinde paylaţmaktadýr. Söz konusu paylaţýlan bilgilere otomatik olarak eriţilerek güvenlik duvarý, SIEM, url filtreleme ve DNS gibi uygulama/sistemlerin entegre edilebilmesi amacýyla USOM tarafýndan API geliţtirilmiţ olup API’nin kullanýmý ile ilgili ayrýntýlý bilgiler aţađýda sunulmuţtur.

    Geliţtirilen API üzerinden “IPv4, IPv6, IPv6net, URL ve Domain” formatlarýnda zararlý adresler sürekli güncellenerek paylaţýlmaktadýr. Ayrýca API ile belirli tarih aralýđý belirterek, zararlý tipine, kritiklik seviyesine göre sorgular yapýlabilmektedir.
  termsOfService: "https://www.usom.gov.tr/gizlilik"
  contact:
    name: "USOM"
    url: "https://www.usom.gov.tr"
    email: "iletisim@usom.gov.tr"
servers: 
  - 
    url: "{scheme}://www.usom.gov.tr"
    variables: 
      scheme: 
        enum: 
          - "https"
        default: "https"
tags: 
  - 
    name: "api"

components:
  schemas:
    ErrorModel: 
      type: "object"
      properties: 
        code: 
          type: "string"
  
    AddressDescription:
      type: "object"
      properties: 
        id: 
          type: "string"
        tr_title: 
          type: "string"
        en_title: 
          type: "string"
        tr_desc: 
          type: "string"
        en_desc: 
          type: "string"
      required: 
        - "id"
        - "tr_title"
        - "en_title"
        - "tr_desc"
        - "en_desc"
    AddressDescriptionResponse:
      type: "object"
      properties:
        totalCount: 
          type: "number"
        count: 
          type: "number"
        models: 
          type: "array"
          items: 
            $ref: "#/components/schemas/AddressDescription"
        page: 
          type: "number"
        pageCount: 
          type: "number"
  
    AddressConnectionTypeResponse:
      type: "object"
      properties: 
        totalCount: 
          type: "number"
        count: 
          type: "number"
        models: 
          type: "array"
          items: 
            $ref: "#/components/schemas/AddressConnectionType"
        page: 
          type: "number"
        pageCount: 
          type: "number"
    AddressConnectionType:
      type: "object"
      properties: 
        id: 
          type: "string"
        tr_title: 
          type: "string"
        en_title: 
          type: "string"
      required: 
        - "id"
        - "tr_title"
        - "en_title"
  
    AddressSourceResponse:
      type: "object"
      properties: 
        totalCount: 
          type: "number"
        count: 
          type: "number"
        models: 
          type: "array"
          items: 
            $ref: "#/components/schemas/AddressSource"
        page: 
          type: "number"
        pageCount: 
          type: "number"
    AddressSource:
      type: "object"
      properties: 
        id: 
          type: "string"
        tr_title: 
          type: "string"
        en_title: 
          type: "string"
      required: 
        - "id"
        - "tr_title"
        - "en_title"
  
    AddressResponse:
      type: "object"
      properties: 
        totalCount: 
          type: "number"
        count: 
          type: "number"
        models: 
          type: "array"
          items: 
            $ref: "#/components/schemas/Address"
        page: 
          type: "number"
        pageCount: 
          type: "number"
    Address:
      type: "object"
      properties:
        id:
          type: "number"
        url:
          type: "string"
        type: 
          type: "string"
        desc: 
          type: "string"
        source: 
          type: "string"
        date: 
          type: "string"
        criticality_level: 
          type: "number"
        connectiontype: 
          type: "string"

paths: 
  /api/address/index: 
    get: 
      security: []
      tags: 
        - "api"
      summary: "api"
      parameters: 
        - 
          in: "query"
          name: "q"
          schema: 
            type: "string"
        - 
          in: "query"
          name: "type"
          schema: 
            type: "string"
            enum: [domain, url, ip, ip6, ip6net]
        - 
          in: "query"
          name: "source"
          description: "AddressSource.id"
          schema: 
            type: "string"
        - 
          in: "query"
          name: "desc"
          description: "AddressDescription.id"
          schema: 
            type: "string"
        - 
          in: "query"
          name: "connectiontype"
          description: "AddressConnectionType.id"
          schema: 
            type: "string"
        - 
          in: "query"
          name: "criticality_level"
          description: "Criticality Level (1 En Yüksek - 10 En Düţük)"
          schema: 
            type: "integer"
            minimum: 1
            maximum: 10
        - 
          in: "query"
          name: "date_gte"
          schema: 
            type: "string"
        - 
          in: "query"
          name: "date_lte"
          schema: 
            type: "string"
        - 
          in: "query"
          name: "page"
          schema: 
            type: "string"
      responses: 
        200: 
          description: ""
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/AddressResponse"
              example: 
                totalCount: 0
                count: 0
                models: []
                page: 0
                pageCount: 0
  /api/address-description/index: 
    get: 
      security: []
      tags: 
        - "api"
      summary: "api"
      responses: 
        200: 
          description: ""
          content: 
