                    en_title: "Malware Distribution Domain"
                    tr_desc: "Zararlý yazýlýmlarýn çalýţmasý için bir bölümünün veya tamamýnýn indirildiđi alan adlarýna ait kategoridir."
                    en_desc: ""
                page: 0
                pageCount: 1
  /api/address-connection-type/index: 
    get: 
      security: []
      tags: 
        - "api"
      summary: "api"
      responses: 
        200: 
          description: ""
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/AddressConnectionTypeResponse"
              example: 
                totalCount: 2
                count: 2
                models: 
                  - 
                    id: "AC"
                    tr_title: "Apt C&C"
                    en_title: "Apt C&C"
                  - 
                    id: "EK"
                    tr_title: "Exploit Kit"
                    en_title: "Exploit Kit"
                page: 0
                pageCount: 1
  /api/address-source/index: 
    get: 
      security: []
      tags: 
        - "api"
      summary: "api"
      responses: 
        200: 
          description: ""
          content: 
            application/json: 
              schema: 
